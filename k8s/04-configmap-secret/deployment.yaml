apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-config-deployment
  namespace: lab
  labels:
    app: hello-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-config
  template:
    metadata:
      labels:
        app: hello-config
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: hello-config
                  key: APP_NAME

            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: hello-config
                  key: APP_ENV

            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: hello-config
                  key: LOG_LEVEL

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hello-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hello-secret
                  key: DB_PASSWORD

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf

      volumes:
        - name: nginx-config
          configMap:
            name: hello-config
            items:
              - key: nginx.conf
                path: nginx.conf