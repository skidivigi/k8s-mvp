apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-deployment
  namespace: lab
  labels:
    app: hello
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello-container
          image: nginx:1.27
          ports:
            - containerPort: 80
