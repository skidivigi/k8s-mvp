apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-storage-deployment
  namespace: lab
  labels:
    app: hello-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-storage
  template:
    metadata:
      labels:
        app: hello-storage
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            - name: hello-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: hello-storage
          persistentVolumeClaim:
            claimName: hello-pvc